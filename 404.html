<!DOCTYPE html>
<html lang="es-CL">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — Pingui Marmolería</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #F2ECE3;
            color: #2C2B28;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.94);
            border-radius: 28px;
            padding: 3rem;
            text-align: center;
            max-width: 500px;
            box-shadow: 0 10px 28px rgba(0,0,0,0.1);
            border: 1px solid #EDE6DC;
        }
        .number {
            font-family: 'Cormorant Garamond', serif;
            font-size: 6rem;
            color: #C7A46B;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            color: #5F4C3B;
            margin: 0 0 1rem;
        }
        p {
            color: #5F4E3F;
            margin-bottom: 2rem;
        }
        a {
            display: inline-block;
            background: #CFB27C;
            color: #fff;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.3s ease;
        }
        a:hover {
            background: #B4905A;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="number">404</div>
        <h1>Página no encontrada</h1>
        <p>La página que buscas no está disponible. Quizás fue movida o el enlace es incorrecto.</p>
        <a href="./">Volver al inicio</a>
    </div>
</body>
</html>
